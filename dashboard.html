<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - CargoConnect Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffc107; --black: #000; --bg: #f4f7f6; }
        body { background-color: var(--bg); font-family: 'Poppins', sans-serif; display: flex; height: 100vh; overflow: hidden; margin: 0; }
        
        /* SIDEBAR NAVIGATION */
        .sidebar { width: 175px; background: var(--black); color: white; display: flex; flex-direction: column; padding: 20px; flex-shrink: 0; }
        .sidebar h2 { color: var(--gold); font-weight: 700; font-size: 18px; margin-bottom: 40px; text-align: center; letter-spacing: 1px; }
        .sidebar a { color: #fff; text-decoration: none; padding: 12px 15px; margin-bottom: 10px; border-radius: 8px; font-size: 0.9rem; font-weight: 600; transition: 0.3s; }
        .sidebar a:hover { background: rgba(255, 255, 255, 0.1); }
        .sidebar a.active { background: var(--gold); color: var(--black); }

        .main-content { flex-grow: 1; overflow-y: auto; padding: 40px; }

        /* METRIC CARDS */
        .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .card { 
            background: #fff; padding: 25px; border: none; border-radius: 15px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-bottom: 5px solid var(--black);
        }
        .card h3 { font-size: 11px; text-transform: uppercase; color: #888; font-weight: 700; margin-bottom: 5px; }
        .card p { font-size: 36px; font-weight: 800; margin: 0; }

        .dashboard-search {
            width: 100%; padding: 15px; margin-bottom: 30px; border-radius: 10px;
            border: 2px solid #000; font-weight: 600; box-shadow: 5px 5px 0px #000; outline: none;
        }

        /* TABLE */
        .shipment-table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        .shipment-table th { background: #000; color: #ffc107; padding: 15px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .shipment-table tr { background: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .shipment-table td { padding: 15px; vertical-align: middle; }
        
        .id-link { color: #000; font-weight: 800; text-decoration: none; border-bottom: 2px solid #ffc107; background: none; border: none; padding: 0; cursor: pointer; }

        /* FIXED SCROLLABLE MODAL (SHIPMENTS STYLE) */
        #detailsModal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); z-index: 10000; align-items: center; justify-content: center; 
        }
        .modal-card { 
            background: #fff; width: 580px; max-height: 85vh; 
            border: 3px solid #000; box-shadow: 10px 10px 0px rgba(0,0,0,0.2); 
            border-radius: 12px; display: flex; flex-direction: column; overflow: hidden;
        }
        .modal-header { background: #000; color: #ffc107; padding: 15px 20px; flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 25px; overflow-y: auto; flex-grow: 1; }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .info-group { margin-bottom: 5px; }
        .info-label { font-size: 9px; font-weight: 800; text-transform: uppercase; color: #888; display: block; margin-bottom: 2px; }
        .info-value { font-size: 13px; font-weight: 700; color: #000; display: block; }
        .section-title { grid-column: span 2; font-size: 11px; font-weight: 800; background: #f0f0f0; padding: 5px 10px; margin: 10px 0; text-transform: uppercase; border-left: 4px solid #ffc107; }
        
        .notes-box { grid-column: span 2; background: #fff9e6; border: 2px dashed #ffc107; padding: 15px; border-radius: 8px; margin-top: 10px; }

        .main-content::-webkit-scrollbar {width: 8px;}
        .main-content::-webkit-scrollbar-thumb {background: var(--black);border-radius: 10px;}
        .main-content::-webkit-scrollbar-track {background: #e0e0e0;}
    </style>
</head>
<body>

<div class="sidebar">
    <img src="../images/LOGO.jpg" width="125" height="60" alt="CargoConnect Logo">
    <br>
    <a href="dashboard.html" class="active"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
        <a href="shipments.html"><i class="fa-solid fa-truck-fast"></i> Shipments</a>
        <a href="fleet.html"><i class="fa-solid fa-bus"></i> Fleet</a>
        <a href="login.html" onclick="return confirmLogout(event)">
    <i class="fa-solid fa-right-from-bracket"></i> Logout
</a>

</div>

<div class="main-content">
    <div class="mb-5">
        <h1 class="fw-bold mb-0">Admin Dashboard</h1>
        <p class="text-muted small">Real-time Logistics Overview</p>
    </div>

    <div class="cards">
        <div class="card"><h3>Total Bookings</h3><p id="countTotal">0</p></div>
        <div class="card"><h3>In Transit</h3><p id="countTransit">0</p></div>
        <div class="card"><h3>Delivered</h3><p id="countDelivered">0</p></div>
        <div class="card"><h3>Pending</h3><p id="countPending">0</p></div>
    </div>

    <h2 class="h5 fw-bold mb-3">Recent Booking History</h2>
    <input id="dashboardSearch" class="dashboard-search" placeholder=" Search Tracking ID or Sender..." onkeyup="updateDashboard()">

    <table class="shipment-table">
        <thead>
            <tr>
                <th>Tracking ID</th>
                <th>Sender</th>
                <th>Route</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="historyTable"></tbody>
    </table>
</div>

<!-- Modal Container -->
<div id="detailsModal">
    <div class="modal-card">
        <div class="modal-header">
            <h6 class="m-0 fw-bold">SHIPMENT MANIFEST</h6>
            <button onclick="closeModal()" style="background:none; border:none; color:#ffc107; font-size:24px; cursor:pointer; line-height:1;">&times;</button>
        </div>
        <div class="modal-body">
            <div id="modalContent" class="info-grid">
                <!-- Data injected here -->
            </div>
        </div>
        <div class="p-3 border-top text-end bg-light">
            <button class="btn btn-dark btn-sm px-5" onclick="closeModal()">DONE</button>
        </div>
    </div>
</div>

<script>
window.onload = function() {
    try {
        const user = JSON.parse(localStorage.getItem('cargoConnectCurrentUser'));
        if (!user || user.role !== 'admin') {
            localStorage.removeItem('cargoConnectCurrentUser');
            window.location.href = 'login.html';
            return;
        }
    } catch (e) {
        localStorage.removeItem('cargoConnectCurrentUser');
        window.location.href = 'login.html';
        return;
    }
    updateDashboard();
};

function updateDashboard() {
    let total = 0, transit = 0, delivered = 0, pending = 0;
    const historyBody = document.getElementById('historyTable');
    const searchTerm = document.getElementById('dashboardSearch').value.toLowerCase();
    historyBody.innerHTML = ""; 

    let bookings = [];
    for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key.startsWith("CC")) {
            bookings.push(JSON.parse(localStorage.getItem(key)));
        }
    }

    // Sort by most recent (optional, but good for dashboard)
    bookings.forEach(data => {
        total++;
        if (data.status === "Pending Confirmation") pending++;
        else if (data.status === "Delivered") delivered++;
        else transit++;

        if (data.id.toLowerCase().includes(searchTerm) || data.sender.toLowerCase().includes(searchTerm)) {
            let statusClass = (data.status === "Delivered") ? "bg-success" : 
                             (data.status === "Pending Confirmation") ? "bg-warning text-dark" : "bg-dark";

            historyBody.innerHTML += `
                <tr>
                    <td><button class="id-link" onclick="viewDetails('${data.id}')">${data.id}</button></td>
                    <td class="fw-bold">${data.sender}</td>
                    <td><small class="text-muted">${data.origin}</small> ➔ <small class="text-dark fw-bold">${data.destination}</small></td>
                    <td><span class="badge ${statusClass}" style="font-size:10px;">${data.status}</span></td>
                    <td><button class="btn btn-sm btn-outline-dark" style="font-size:10px; font-weight:700;" onclick="viewDetails('${data.id}')">VIEW</button></td>
                </tr>`;
        }
    });

    document.getElementById('countTotal').innerText = total;
    document.getElementById('countTransit').innerText = transit;
    document.getElementById('countDelivered').innerText = delivered;
    document.getElementById('countPending').innerText = pending;
}

function viewDetails(id) {
    const data = JSON.parse(localStorage.getItem(id));
    if(!data) return;

    // Consistency Logic: Check Service Type and Address
    const serviceType = (data.service || "").toLowerCase();
    const hasAddress = data.address && data.address.trim() !== "";
    const showAddress = serviceType.includes("door") || serviceType.includes("van") || hasAddress;
    
    // Notes logic (Check for all possible keys)
    const shipmentNotes = data.notes || data.note || data.instructions || data.specialNotes || "No special instructions provided.";

    document.getElementById('modalContent').innerHTML = `
        <div class="section-title">Logistics Info</div>
        <div class="info-group"><span class="info-label">Tracking ID</span><span class="info-value" style="color:#d9534f;">${data.id || 'N/A'}</span></div>
        <div class="info-group"><span class="info-label">Current Status</span><span class="info-value text-primary">${data.status || 'Pending'}</span></div>
        <div class="info-group"><span class="info-label">Service Mode</span><span class="info-value">${data.service || 'Standard'}</span></div>
        <div class="info-group"><span class="info-label">Contact</span><span class="info-value">${data.contact || 'No Contact Number'}</span></div>

        <div class="section-title">Customer Details</div>
        <div class="info-group"><span class="info-label">Sender Name</span><span class="info-value">${data.sender || '---'}</span></div>
        <div class="info-group"><span class="info-label">Receiver Name</span><span class="info-value">${data.receiver || '---'}</span></div>

        <div class="section-title">âž & Destination</div>
        <div class="info-group"><span class="info-label">Origin Hub</span><span class="info-value">${data.origin || '---'}</span></div>
        <div class="info-group"><span class="info-label">Destination Hub</span><span class="info-value">${data.destination || '---'}</span></div>
        
        ${showAddress ? `
            <div class="info-group" style="grid-column: span 2;"><span class="info-label">Complete Delivery Address</span><span class="info-value">${data.address}</span></div>
            <div class="info-group" style="grid-column: span 2;"><span class="info-label">Nearby Landmark</span><span class="info-value">${data.landmark || 'Not specified'}</span></div>
        ` : `
            <div class="info-group" style="grid-column: span 2; opacity: 0.7;"><span class="info-label">Pickup Type</span><span class="info-value">Station Pickup (Hub-to-Hub)</span></div>
        `}

        <div class="section-title">Special Notes / Instructions</div>
        <div class="notes-box">
            <span class="info-value" style="font-weight: 500; line-height: 1.5;">${shipmentNotes}</span>
        </div>
    `;
    document.getElementById('detailsModal').style.display = 'flex';
}

function closeModal() { document.getElementById('detailsModal').style.display = 'none'; }

function confirmLogout(event) {
    event.preventDefault();

    if (confirm("Are you sure you want to log out?")) {
        localStorage.removeItem("cargoConnectCurrentUser");
        window.location.href = "login.html";
    }

    return false;
}

</script>
<script src="cargo-api.js"></script>
<script>
let dashboardShipments = [];

window.onload = async function() {
    try {
        const user = JSON.parse(localStorage.getItem('cargoConnectCurrentUser'));
        if (!user || user.role !== 'admin') {
            localStorage.removeItem('cargoConnectCurrentUser');
            window.location.href = 'login.html';
            return;
        }
    } catch (e) {
        localStorage.removeItem('cargoConnectCurrentUser');
        window.location.href = 'login.html';
        return;
    }

    await updateDashboard();
};

async function updateDashboard() {
    const historyBody = document.getElementById('historyTable');
    const searchTerm = (document.getElementById('dashboardSearch')?.value || '').toLowerCase();
    historyBody.innerHTML = "";

    try {
        dashboardShipments = await cargoGetShipments();
    } catch (error) {
        console.error("Dashboard database load failed:", error);
        historyBody.innerHTML = `<tr><td colspan="5" class="text-center text-danger">Could not load database shipments.</td></tr>`;
        return;
    }

    let total = dashboardShipments.length;
    let delivered = dashboardShipments.filter(item => item.status === "Delivered").length;
    let pending = dashboardShipments.filter(item => item.status === "Pending Confirmation").length;
    let transit = total - delivered - pending;

    dashboardShipments.forEach(data => {
        const haystack = [data.id, data.sender, data.receiver, data.origin, data.destination, data.status].join(" ").toLowerCase();
        if (searchTerm && !haystack.includes(searchTerm)) return;

        let statusClass = (data.status === "Delivered") ? "bg-success" :
            (data.status === "Pending Confirmation") ? "bg-warning text-dark" : "bg-dark";

        historyBody.innerHTML += `
            <tr>
                <td><button class="id-link" onclick="viewDetails('${data.id}')">${data.id}</button></td>
                <td class="fw-bold">${data.sender || "---"}</td>
                <td><small class="text-muted">${data.origin || "---"}</small> -> <small class="text-dark fw-bold">${data.destination || "---"}</small></td>
                <td><span class="badge ${statusClass}" style="font-size:10px;">${data.status}</span></td>
                <td><button class="btn btn-sm btn-outline-dark" style="font-size:10px; font-weight:700;" onclick="viewDetails('${data.id}')">VIEW</button></td>
            </tr>`;
    });

    document.getElementById('countTotal').innerText = total;
    document.getElementById('countTransit').innerText = transit;
    document.getElementById('countDelivered').innerText = delivered;
    document.getElementById('countPending').innerText = pending;
}

function viewDetails(id) {
    const data = dashboardShipments.find(item => item.id === id);
    if (!data) return;

    const showAddress = (data.service || "").toLowerCase().includes("door") || data.address;

    document.getElementById('modalContent').innerHTML = `
        <div class="section-title">Logistics Info</div>
        <div class="info-group"><span class="info-label">Tracking ID</span><span class="info-value" style="color:#d9534f;">${data.id || 'N/A'}</span></div>
        <div class="info-group"><span class="info-label">Current Status</span><span class="info-value text-primary">${data.status || 'Pending'}</span></div>
        <div class="info-group"><span class="info-label">Service Mode</span><span class="info-value">${data.service || 'Standard'}</span></div>
        <div class="info-group"><span class="info-label">Contact</span><span class="info-value">${data.contact || 'No Contact Number'}</span></div>
        <div class="section-title">Customer Details</div>
        <div class="info-group"><span class="info-label">Sender Name</span><span class="info-value">${data.sender || '---'}</span></div>
        <div class="info-group"><span class="info-label">Receiver Name</span><span class="info-value">${data.receiver || '---'}</span></div>
        <div class="section-title">Route & Destination</div>
        <div class="info-group"><span class="info-label">Origin Hub</span><span class="info-value">${data.origin || '---'}</span></div>
        <div class="info-group"><span class="info-label">Destination Hub</span><span class="info-value">${data.destination || '---'}</span></div>
        ${showAddress ? `<div class="info-group" style="grid-column: span 2;"><span class="info-label">Complete Delivery Address</span><span class="info-value">${data.address}</span></div>` : ''}
        <div class="section-title">Special Notes / Instructions</div>
        <div class="notes-box"><span class="info-value" style="font-weight: 500; line-height: 1.5;">${data.instructions || "No special instructions provided."}</span></div>
    `;
    document.getElementById('detailsModal').style.display = 'flex';
}
</script>
</body>
</html>
