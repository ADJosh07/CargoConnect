<!DOCTYPE html>
<html lang="en">
<head>
    <title>Fleet - CargoConnect Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root { --gold: #ffc107; --black: #000; --bg: #f4f7f6; }

        body {
            background-color: var(--bg);
            font-family: 'Poppins', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            margin: 0;
        }

        .sidebar {
            width: 175px;
            background: var(--black);
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px;
            flex-shrink: 0;
        }

        .sidebar a {
            color: #fff;
            text-decoration: none;
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .sidebar a:hover { background: rgba(255, 255, 255, 0.1); }
        .sidebar a.active { background: var(--gold); color: var(--black); }

        .main-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 40px;
        }

        .admin-card {
            background: #fff;
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border-bottom: 5px solid var(--black);
            padding: 25px;
            margin-bottom: 25px;
        }

        .form-label {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            color: #777;
        }

        .form-control,
        .form-select {
            border: 2px solid #000;
            border-radius: 10px;
            font-weight: 600;
            padding: 12px;
        }

        .fleet-search {
            width: 100%;
            padding: 15px;
            margin-bottom: 25px;
            border-radius: 10px;
            border: 2px solid #000;
            font-weight: 600;
            box-shadow: 5px 5px 0px #000;
            outline: none;
        }

        .fleet-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }

        .fleet-table th {
            background: #000;
            color: #ffc107;
            padding: 15px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .fleet-table tr {
            background: #fff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .fleet-table td {
            padding: 15px;
            vertical-align: middle;
        }

        .vhc-id-link {
            color: #000;
            font-weight: 800;
            text-decoration: none;
            border-bottom: 2px solid #ffc107;
        }

        .validation-card {
            display: none;
            border: 2px solid #000;
            border-left: 8px solid #ffc107;
            background: #fff9e6;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .validation-card.error {
            border-left-color: #dc3545;
            background: #fff0f0;
        }

        .validation-card.success {
            border-left-color: #198754;
            background: #effaf3;
        }

        .main-content::-webkit-scrollbar { width: 8px; }
        .main-content::-webkit-scrollbar-thumb { background: var(--black); border-radius: 10px; }
        .main-content::-webkit-scrollbar-track { background: #e0e0e0; }
    </style>
</head>

<body>
<div class="sidebar">
    <img src="C:\Users\giana.LAPTOP-T815TB3S\OneDrive\Documents\Cargo Connect\PICTURES\LOGO.png" width="125" height="60">
    <br>
    <a href="dashboard.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
    <a href="shipments.html"><i class="fa-solid fa-truck-fast"></i> Shipments</a>
    <a href="fleet.html" class="active"><i class="fa-solid fa-bus"></i> Fleet</a>
    <a href="login.html" onclick="return confirmLogout(event)">
    <i class="fa-solid fa-right-from-bracket"></i> Logout
</a>

</div>

<div class="main-content">
    <div class="mb-4">
        <h1 class="fw-bold mb-0">Fleet Management</h1>
        <p class="text-muted small">Assign, dispatch, and monitor CargoConnect vehicles</p>
    </div>

    <div id="fleetValidationCard" class="validation-card"></div>

    <div class="admin-card">
        <h2 class="h5 fw-bold mb-3">Add Vehicle</h2>

        <div class="row g-3 align-items-end">
            <div class="col-md-5">
                <label class="form-label">Vehicle Type</label>
                <select id="vType" class="form-select" onchange="previewCapacity()">
                    <option value="">Select vehicle type...</option>
                    <option value="Motorcycle">Motorcycle - 25 kg</option>
                    <option value="Pickup">Pickup - 1,000 kg</option>
                    <option value="Van">Van - 1,200 kg</option>
                    <option value="Small Truck">Small Truck - 3,000 kg</option>
                    <option value="Medium Truck">Medium Truck - 7,000 kg</option>
                    <option value="Large Truck">Large Truck - 14,000 kg</option>
                    <option value="Container Truck">Container Truck - 28,000 kg</option>
                    <option value="Cargo Ship">Cargo Ship - 500,000 kg</option>
                </select>
            </div>

            <div class="col-md-4">
    <label class="form-label">Current Hub</label>
    <select id="vLoc" class="form-select">
        <option value="">Select a hub...</option>

        <optgroup label="Luzon">
            <option value="Manila Port">Manila Port</option>
            <option value="Batangas Port">Batangas Port</option>
            <option value="Subic Bay">Subic Bay</option>
            <option value="Cavite Hub">Cavite Hub</option>
        </optgroup>

        <optgroup label="Visayas">
            <option value="Cebu Port">Cebu Port</option>
            <option value="Iloilo Hub">Iloilo Hub</option>
            <option value="Bacolod Station">Bacolod Station</option>
        </optgroup>

        <optgroup label="Mindanao">
            <option value="Davao Port">Davao Port</option>
            <option value="Cagayan de Oro">Cagayan de Oro</option>
            <option value="General Santos">General Santos</option>
            <option value="Zamboanga Port">Zamboanga Port</option>
        </optgroup>
    </select>
</div>


            <div class="col-md-3">
                <button class="btn btn-warning fw-bold w-100" onclick="addVehicle()">
                    <i class="fa-solid fa-plus"></i> Add Vehicle
                </button>
            </div>
        </div>

        <div id="capacityPreview" class="small text-muted fw-bold mt-3"></div>
    </div>

    <div class="admin-card">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="h5 fw-bold mb-0">Fleet List</h2>
            <button class="btn btn-dark btn-sm fw-bold" onclick="dispatchAll()">
                <i class="fa-solid fa-truck-fast"></i> Dispatch All Ready
            </button>
        </div>

        <input id="fleetSearch" class="fleet-search" placeholder="Search Vehicle ID or Type..." onkeyup="renderFleet()">

        <table class="fleet-table">
            <thead>
                <tr>
                    <th>Vehicle ID</th>
                    <th>Type</th>
                    <th>Current Hub</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="fleetTableBody"></tbody>
        </table>
    </div>
</div>

<script>
function safeParse(key) {
    try {
        const item = localStorage.getItem(key);
        return item ? JSON.parse(item) : null;
    } catch {
        return null;
    }
}

function esc(value) {
    return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function showValidation(message, type = "error") {
    const card = document.getElementById("fleetValidationCard");
    if (!card) return;

    card.className = "validation-card " + type;
    card.innerHTML = message;
    card.style.display = "block";

    setTimeout(function () {
        card.style.display = "none";
    }, 4500);
}

function getDefaultCapacity(type) {
    const t = String(type || "").toLowerCase();

    if (t.includes("motor") || t.includes("bike")) return 25;
    if (t.includes("van")) return 1200;
    if (t.includes("pickup")) return 1000;
    if (t.includes("small truck")) return 3000;
    if (t.includes("medium truck")) return 7000;
    if (t.includes("large truck")) return 14000;
    if (t.includes("container")) return 28000;
    if (t.includes("ship")) return 500000;

    return 1000;
}

function previewCapacity() {
    const type = document.getElementById("vType").value;
    const preview = document.getElementById("capacityPreview");

    if (!type) {
        preview.innerText = "";
        return;
    }

    preview.innerText = "Cargo capacity will be set to " + getDefaultCapacity(type).toLocaleString() + " kg.";
}

function sameVehicle(shipmentVehicleId, vehicle, fleetKey) {
    if (!shipmentVehicleId || !vehicle) return false;

    const a = String(shipmentVehicleId).trim();
    const vehicleId = String(vehicle.id || "").trim();
    const storageKey = String(fleetKey || "").trim();
    const storageId = storageKey.replace("FLT_", "");

    return a === vehicleId || a === storageKey || a === storageId;
}

function upgradeFleetCapacities() {
    for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (!key.startsWith("FLT_")) continue;

        const v = safeParse(key);
        if (!v) continue;

        if (!v.maxCap || parseFloat(v.maxCap) === 1000) {
            v.maxCap = getDefaultCapacity(v.type);
            localStorage.setItem(key, JSON.stringify(v));
        }
    }
}

function getVehicleLoadData(vehicleRef) {
    const fleetKey = localStorage.getItem(vehicleRef) ? vehicleRef : "FLT_" + vehicleRef;
    const v = safeParse(fleetKey);

    if (!v) return { count: 0, totalWeight: 0 };

    let count = 0;
    let totalWeight = 0;

    for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (!key.startsWith("CC")) continue;

        const s = safeParse(key);

        if (s && sameVehicle(s.vehicleID, v, fleetKey) && s.status !== "Delivered") {
            count++;
            totalWeight += parseFloat(s.weight || 0);
        }
    }

    return { count, totalWeight };
}

function renderFleet() {
    const tbody = document.getElementById("fleetTableBody");
    const search = (document.getElementById("fleetSearch")?.value || "").toLowerCase();

    if (!tbody) return;
    tbody.innerHTML = "";

    let foundVehicles = 0;

    for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (!key.startsWith("FLT_")) continue;

        let v = safeParse(key);
        if (!v) continue;

        if (!v.maxCap) {
            v.maxCap = getDefaultCapacity(v.type);
            localStorage.setItem(key, JSON.stringify(v));
        }

        const loadData = getVehicleLoadData(key);

        if (v.status === "Dispatched" && loadData.count === 0) {
            v.status = "At Hub";
            localStorage.setItem(key, JSON.stringify(v));
        }

        const match =
            (v.id || "").toLowerCase().includes(search) ||
            (v.type || "").toLowerCase().includes(search);

        if (!match) continue;

        foundVehicles++;

        const isTransit = v.status === "Dispatched";

        tbody.innerHTML += `
        <tr>
            <td>
                <a class="vhc-id-link" href="vehicle-details.html?id=${encodeURIComponent(v.id)}">
                    ${esc(v.id)}
                </a>
            </td>
            <td>${esc(v.type)}</td>
            <td>${esc(v.currentLoc)}</td>
            <td>
                <span class="badge" style="background-color: ${isTransit ? "#000" : "#ffc107"}; color: ${isTransit ? "#ffc107" : "#000"}; border: 1px solid #000; padding: 6px 12px; font-weight: 800; font-size: 10px; border-radius: 20px; min-width: 90px; display: inline-block;">
                    ${isTransit ? "IN TRANSIT" : "AT HUB"}
                </span>
            </td>
            <td>
                ${
                    isTransit
                        ? `<button class="btn btn-secondary btn-sm fw-bold" disabled>IN TRANSIT</button>`
                        : loadData.count > 0
                        ? `<button class="btn btn-warning btn-sm fw-bold" onclick="dispatchVehicle('${esc(key)}')">DISPATCH</button>`
                        : `<button class="btn btn-secondary btn-sm fw-bold" disabled>NO LOAD</button>`
                }
                <button class="btn btn-outline-danger btn-sm fw-bold ms-1" onclick="removeVehicle('${esc(key)}')">REMOVE</button>
            </td>
        </tr>`;
    }

    if (foundVehicles === 0) {
        tbody.innerHTML = `<tr><td colspan="5" class="text-center fw-bold p-4">No fleet vehicles found.</td></tr>`;
    }
}

function setShipmentInTransit(s, key, vehicle, fleetKey) {
    s.vehicleID = vehicle.id || fleetKey.replace("FLT_", "");
    s.status = "In Transit";

    if (!s.inTransitAt) {
        s.inTransitAt = new Date().toLocaleString();
        s.inTransitAtISO = new Date().toISOString();
    }

    localStorage.setItem(key, JSON.stringify(s));
}

function dispatchVehicle(vehicleRef) {
    const fleetKey = localStorage.getItem(vehicleRef) ? vehicleRef : "FLT_" + vehicleRef;
    const v = safeParse(fleetKey);

    if (!v) {
        showValidation("Fleet vehicle not found.", "error");
        return;
    }

    const load = getVehicleLoadData(fleetKey);

    if (load.count === 0) {
        showValidation("This vehicle has no assigned shipments, so it cannot be dispatched.", "error");
        return;
    }

    if (!confirm("Dispatch " + (v.id || fleetKey) + " with " + load.count + " assigned shipment(s)?")) {
        showValidation("Dispatch cancelled.", "error");
        return;
    }

    v.status = "Dispatched";
    localStorage.setItem(fleetKey, JSON.stringify(v));

    for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (!key.startsWith("CC")) continue;

        const s = safeParse(key);

        if (s && sameVehicle(s.vehicleID, v, fleetKey) && s.status !== "Delivered") {
            setShipmentInTransit(s, key, v, fleetKey);
        }
    }

    showValidation((v.id || fleetKey) + " dispatched successfully.", "success");
    renderFleet();
}

function dispatchAll() {
    let readyCount = 0;

    for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (!key.startsWith("FLT_")) continue;

        const v = safeParse(key);
        if (!v) continue;

        const load = getVehicleLoadData(key);

        if (v.status !== "Dispatched" && load.count > 0) {
            readyCount++;
        }
    }

    if (readyCount === 0) {
        showValidation("No vehicles are ready for dispatch.", "error");
        return;
    }

    if (!confirm("Dispatch all " + readyCount + " vehicle(s) with assigned shipments?")) {
        showValidation("Dispatch all cancelled.", "error");
        return;
    }

    for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (!key.startsWith("FLT_")) continue;

        const v = safeParse(key);
        if (!v) continue;

        const load = getVehicleLoadData(key);

        if (v.status !== "Dispatched" && load.count > 0) {
            dispatchVehicleWithoutConfirm(key);
        }
    }

    showValidation("All ready vehicles were dispatched.", "success");
    renderFleet();
}

function dispatchVehicleWithoutConfirm(vehicleRef) {
    const fleetKey = localStorage.getItem(vehicleRef) ? vehicleRef : "FLT_" + vehicleRef;
    const v = safeParse(fleetKey);
    if (!v) return;

    v.status = "Dispatched";
    localStorage.setItem(fleetKey, JSON.stringify(v));

    for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (!key.startsWith("CC")) continue;

        const s = safeParse(key);

        if (s && sameVehicle(s.vehicleID, v, fleetKey) && s.status !== "Delivered") {
            setShipmentInTransit(s, key, v, fleetKey);
        }
    }
}

function addVehicle() {
    let id = "VHC-" + Math.floor(1000 + Math.random() * 9000);
    const typeEl = document.getElementById("vType");
    const locEl = document.getElementById("vLoc");
    const previewEl = document.getElementById("capacityPreview");

    const type = typeEl ? typeEl.value.trim() : "";
    const loc = locEl ? locEl.value.trim() : "";

    while (localStorage.getItem("FLT_" + id)) {
        id = "VHC-" + Math.floor(1000 + Math.random() * 9000);
    }

    if (!type) {
        showValidation("Please select a vehicle type before adding a fleet record.", "error");
        return;
    }

    if (!loc) {
        showValidation("Please select a current hub before adding a fleet record.", "error");
        return;
    }

    const v = {
        id: id,
        type: type,
        currentLoc: loc,
        status: "At Hub",
        maxCap: getDefaultCapacity(type)
    };

    localStorage.setItem("FLT_" + id, JSON.stringify(v));

    if (typeEl) typeEl.value = "";
    if (locEl) locEl.value = "";
    if (previewEl) previewEl.innerText = "";

    showValidation(id + " added successfully with " + v.maxCap.toLocaleString() + " kg cargo capacity.", "success");
    renderFleet();
}

function removeVehicle(vehicleRef) {
    const fleetKey = localStorage.getItem(vehicleRef) ? vehicleRef : "FLT_" + vehicleRef;
    const v = safeParse(fleetKey);

    if (!v) {
        showValidation("Fleet vehicle not found.", "error");
        return;
    }

    const load = getVehicleLoadData(fleetKey);

    if (load.count > 0) {
        showValidation("You cannot remove this vehicle because it still has assigned shipments.", "error");
        return;
    }

    if (!confirm("Remove fleet " + (v.id || fleetKey) + "?")) {
        showValidation("Remove cancelled.", "error");
        return;
    }

    localStorage.removeItem(fleetKey);
    showValidation((v.id || fleetKey) + " removed successfully.", "success");
    renderFleet();
}

function confirmLogout(event) {
    event.preventDefault();

    if (confirm("Are you sure you want to log out?")) {
        window.location.href = "login.html";
    }

    return false;
}

window.onload = function () {
    upgradeFleetCapacities();
    renderFleet();
};
</script>

</body>
</html>
