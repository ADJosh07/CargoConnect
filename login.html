<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CargoConnect</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link href="bootstrap.min.css" rel="stylesheet">
    <script src="auth.js"></script>
    <style>
        :root {
            --primary-gold: #ffc107;
            --dark-bg: #000000;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0e0e0e;
            margin: 0;
            overflow: hidden;
        }

        .login-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            width: 950px;
            height: 550px;
            display: flex;
            background: #fff;
            border-radius: 15px;
            overflow: hidden;
            border: 4px solid var(--dark-bg);
            box-shadow: 20px 20px 0px rgba(255, 193, 7, 0.15);
        }

        .brand-side {
            flex: 1;
            background: var(--dark-bg);
            color: white;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            border-right: 8px solid var(--primary-gold);
        }

        .brand-side img {
            width: 250px;
            height: 150px;
            object-fit: contain;
        }

        .brand-side p {
            font-size: 0.9rem;
            opacity: 0.8;
            max-width: 300px;
            font-weight: 300;
        }

        .version-tag {
            position: absolute;
            bottom: 40px;
            left: 60px;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
        }

        .form-side {
            flex: 1;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-header h3 {
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 5px;
            color: var(--dark-bg);
        }

        .form-label {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--dark-bg);
            margin-bottom: 8px;
        }

        .form-control {
            border: 2px solid #eee;
            padding: 12px 15px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            transition: 0.3s;
        }

        .form-control:focus {
            border-color: var(--primary-gold);
            box-shadow: none;
            background: #fffdf5;
        }

        .btn-signin {
            background: var(--dark-bg);
            color: var(--primary-gold);
            border: none;
            padding: 15px;
            font-weight: 800;
            letter-spacing: 1px;
            border-radius: 8px;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn-signin:hover {
            background: var(--primary-gold);
            color: var(--dark-bg);
            transform: translateY(-3px);
        }

        .register-link {
            text-align: center;
            margin-top: 30px;
            font-size: 13px;
        }

        .register-link a {
            color: var(--dark-bg);
            font-weight: 800;
            text-decoration: none;
            border-bottom: 2px solid var(--primary-gold);
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="brand-side">
                <img src="C:\Users\giana.LAPTOP-T815TB3S\OneDrive\Documents\Cargo Connect\PICTURES\LOGO.png" alt="CargoConnect Logo">
                <br>
                <p>Advanced logistics and fleet management interface.</p>
                <div class="version-tag">Book Now!</div>
            </div>

            <div class="form-side">
                <div class="form-header">
                    <h3>Login</h3>
                </div>

                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label" for="username">Name or Email</label>
                        <input type="text" id="username" class="form-control" placeholder="Enter Name or Email" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label" for="password">Password</label>

                        <div style="position: relative;">
                            <input type="password" id="password" class="form-control" placeholder="Enter password" required style="padding-right: 45px;">

                            <button type="button"
                                onclick="togglePassword()"
                                style="position:absolute; right:10px; top:50%; transform:translateY(-50%); border:none; background:transparent; color:#000; cursor:pointer;">
                                <i id="passwordIcon" class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-signin w-100">SIGN IN</button>
                </form>

                <div class="register-link">
                    <span class="text-muted">No account yet?</span>
                    <a href="register.html">REGISTER</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById("password");
            const icon = document.getElementById("passwordIcon");

            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                icon.className = "fa-solid fa-eye-slash";
            } else {
                passwordInput.type = "password";
                icon.className = "fa-solid fa-eye";
            }
        }
    </script>

</body>
</html>
