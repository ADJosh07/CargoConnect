<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | CargoConnect</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --primary-gold: #ffc107;
            --dark-bg: #000000;
            --light-bg: #f4f7f6;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--light-bg);
            color: #000;
            padding-top: 95px;
        }

        .navbar-custom {
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(10px);
            padding: 15px 5%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 25px;
            font-weight: 400;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--primary-gold);
        }

        .profile-container {
            max-width: 1180px;
            margin: 30px auto;
            padding: 0 20px 50px;
        }

        .profile-header {
            background: #000;
            color: white;
            border-radius: 18px;
            padding: 35px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 6px solid var(--primary-gold);
            box-shadow: 0 12px 30px rgba(0,0,0,0.12);
        }

        .avatar {
            width: 82px;
            height: 82px;
            border-radius: 50%;
            background: var(--primary-gold);
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 800;
            border: 3px solid #fff;
            flex-shrink: 0;
        }

        .profile-name h1 {
            font-size: 2rem;
            font-weight: 800;
            margin: 0;
            text-transform: uppercase;
        }

        .profile-name p {
            margin: 5px 0 0;
            color: #cbd5e1;
            font-size: 0.9rem;
        }

        .status-pill {
            background: var(--primary-gold);
            color: #000;
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 18px;
            margin: 25px 0;
        }

        .stat-card {
            background: white;
            padding: 22px;
            border-radius: 14px;
            border: 1px solid #eee;
            border-bottom: 5px solid #000;
            box-shadow: 0 8px 20px rgba(0,0,0,0.04);
        }

        .stat-card label {
            display: block;
            color: #64748b;
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .stat-card span {
            font-size: 1.8rem;
            font-weight: 800;
            color: #000;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 25px;
        }

        .panel {
            background: white;
            border-radius: 16px;
            padding: 28px;
            border: 1px solid #eee;
            box-shadow: 0 8px 20px rgba(0,0,0,0.04);
        }

        .panel-title {
            font-size: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            border-left: 5px solid var(--primary-gold);
            padding-left: 12px;
            margin-bottom: 22px;
        }

        .info-row {
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 13px;
            margin-bottom: 13px;
        }

        .info-row label {
            display: block;
            font-size: 0.68rem;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
        }

        .info-row span {
            font-weight: 700;
            color: #111827;
            word-break: break-word;
        }

        .form-label {
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            color: #64748b;
        }

        .form-control {
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            padding: 12px 14px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .form-control:focus {
            border-color: var(--primary-gold);
            box-shadow: none;
        }

        .btn-main {
            background: #000;
            color: var(--primary-gold);
            border: none;
            border-radius: 10px;
            padding: 12px 18px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.78rem;
            transition: 0.3s;
        }

        .btn-main:hover {
            background: var(--primary-gold);
            color: #000;
        }

        .history-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin-bottom: 18px;
        }

        .history-toolbar input,
        .history-toolbar select {
            border: 2px solid #000;
            border-radius: 10px;
            padding: 11px 14px;
            font-weight: 700;
            outline: none;
        }

        .history-toolbar input {
            flex: 1;
        }

        .booking-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }

        .booking-table th {
            background: #000;
            color: var(--primary-gold);
            padding: 14px;
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .booking-table td {
            background: #fff;
            padding: 14px;
            vertical-align: middle;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .booking-table td:first-child {
            border-left: 1px solid #eee;
            border-radius: 10px 0 0 10px;
        }

        .booking-table td:last-child {
            border-right: 1px solid #eee;
            border-radius: 0 10px 10px 0;
        }

        .tracking-id {
            font-weight: 800;
            color: #000;
            border-bottom: 2px solid var(--primary-gold);
        }

        .badge-status {
            background: #000;
            color: var(--primary-gold);
            border: 1px solid #000;
            padding: 6px 10px;
            border-radius: 50px;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .badge-delivered {
            background: #198754;
            color: #fff;
        }

        .badge-pending {
            background: var(--primary-gold);
            color: #000;
        }

        .empty-state {
            text-align: center;
            padding: 45px 20px;
            color: #64748b;
            font-weight: 700;
        }

        .validation-card {
            display: none;
            background: #fff9e6;
            border: 2px solid #000;
            border-left: 8px solid var(--primary-gold);
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 20px;
            font-size: 13px;
            font-weight: 700;
            box-shadow: 4px 4px 0 #000;
        }

        .validation-card.success {
            background: #effaf3;
            border-left-color: #198754;
        }

        .validation-card.error {
            background: #fff0f0;
            border-left-color: #dc3545;
        }

        @media (max-width: 992px) {
            .content-grid,
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .profile-header {
                align-items: flex-start;
                flex-direction: column;
                gap: 18px;
            }

            .history-toolbar {
                flex-direction: column;
                align-items: stretch;
            }

            .booking-table {
                min-width: 760px;
            }

            .table-wrap {
                overflow-x: auto;
            }
        }
    </style>
</head>

<body>
<nav class="navbar-custom">
    <img src="LOGO.jpg" width="125" height="60">

    <div class="nav-links">
        <a href="home.html"><i class="fa-solid fa-house"></i> Home</a>
        <a href="tracking.html"><i class="fa-solid fa-location-dot"></i> Track</a>
        <a href="book.html"><i class="fa-solid fa-file-pen"></i> Book</a>
        <a href="profile.html" class="active"><i class="fa-solid fa-user"></i> Profile</a>
        <a href="login.html" onclick="return confirmLogout(event)">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
        </a>
    </div>
</nav>

<main class="profile-container">
    <div id="profileValidationCard" class="validation-card"></div>

    <section class="profile-header">
        <div class="d-flex align-items-center gap-4">
            <div class="avatar" id="avatarInitials">CC</div>
            <div class="profile-name">
                <h1 id="displayName">Customer</h1>
                <p id="displayEmail">customer@email.com</p>
            </div>
        </div>

        <div class="status-pill">
            <i class="fa-solid fa-circle-check"></i> Verified Customer
        </div>
    </section>

    <section class="stats-grid">
        <div class="stat-card">
            <label>Total Bookings</label>
            <span id="totalBookings">0</span>
        </div>

        <div class="stat-card">
            <label>Active Shipments</label>
            <span id="activeBookings">0</span>
        </div>

        <div class="stat-card">
            <label>Delivered</label>
            <span id="deliveredBookings">0</span>
        </div>

        <div class="stat-card">
            <label>Total Paid</label>
            <span id="totalPaid">₱0</span>
        </div>
    </section>

    <section class="content-grid">
        <aside class="panel">
            <h2 class="panel-title">Account Details</h2>

            <div class="info-row">
                <label>Full Name</label>
                <span id="infoName">---</span>
            </div>

            <div class="info-row">
                <label>Email Address</label>
                <span id="infoEmail">---</span>
            </div>

            <div class="info-row">
                <label>Contact Number</label>
                <span id="infoContact">---</span>
            </div>

            <div class="info-row">
                <label>Complete Address</label>
                <span id="infoAddress">---</span>
            </div>

            <h2 class="panel-title mt-4">Edit Profile</h2>

            <label class="form-label">Full Name</label>
            <input type="text" id="editName" class="form-control mb-3">

            <label class="form-label">Email Address</label>
            <input type="email" id="editEmail" class="form-control mb-3">

            <label class="form-label">Contact Number</label>
            <input type="text" id="editContact" class="form-control mb-3" maxlength="11">

            <label class="form-label">Complete Address</label>
            <textarea id="editAddress" class="form-control mb-3" rows="3"></textarea>

            <button class="btn-main w-100" onclick="saveProfile()">
                <i class="fa-solid fa-floppy-disk"></i> Save Profile
            </button>
        </aside>

        <section class="panel">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
                <h2 class="panel-title m-0">Booking History</h2>
                <button class="btn-main" onclick="window.location.href='book.html'">
                    <i class="fa-solid fa-plus"></i> New Booking
                </button>
            </div>

            <div class="history-toolbar">
                <input type="text" id="historySearch" placeholder="Search tracking ID, route, receiver..." oninput="renderHistory()">

                <select id="statusFilter" onchange="renderHistory()">
                    <option value="all">All Status</option>
                    <option value="active">Active Only</option>
                    <option value="Pending Confirmation">Pending Confirmation</option>
                    <option value="Approved">Approved</option>
                    <option value="Assigned">Assigned</option>
                    <option value="In Transit">In Transit</option>
                    <option value="Out for Delivery">Out for Delivery</option>
                    <option value="Delivered">Delivered</option>
                </select>
            </div>

            <div class="table-wrap">
                <table class="booking-table">
                    <thead>
                        <tr>
                            <th>Tracking ID</th>
                            <th>Route</th>
                            <th>Receiver</th>
                            <th>Status</th>
                            <th>Payment</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody"></tbody>
                </table>
            </div>
        </section>
    </section>
</main>

<script>
const USERS_KEY = "cargoConnectUsers";
const CURRENT_USER_KEY = "cargoConnectCurrentUser";

let currentUser = null;
let userBookings = [];

function safeParseStorage(key) {
    try {
        const item = localStorage.getItem(key);
        return item ? JSON.parse(item) : null;
    } catch {
        return null;
    }
}

function normalize(value) {
    return String(value || "").trim().toLowerCase();
}

function esc(value) {
    return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function money(value) {
    return "₱" + Number(value || 0).toLocaleString();
}

function showValidation(message, type = "error") {
    const card = document.getElementById("profileValidationCard");

    card.className = "validation-card " + type;
    card.innerHTML = message;
    card.style.display = "block";

    setTimeout(function () {
        card.style.display = "none";
    }, 4500);
}

function confirmLogout(event) {
    event.preventDefault();

    if (confirm("Are you sure you want to log out?")) {
        localStorage.removeItem(CURRENT_USER_KEY);
        window.location.href = "login.html";
    }

    return false;
}

function getInitials(name) {
    const parts = String(name || "Cargo Customer").trim().split(/\s+/);
    const first = parts[0] ? parts[0][0] : "C";
    const second = parts.length > 1 ? parts[1][0] : "C";
    return (first + second).toUpperCase();
}

function belongsToCurrentUser(data) {
    if (!currentUser || !data) return false;

    const userEmail = normalize(currentUser.email);
    const bookingEmail = normalize(data.customerEmail);
    const userId = String(currentUser.id || "");
    const bookingUserId = String(data.customerUserId || "");

    if (userEmail && bookingEmail && userEmail === bookingEmail) return true;
    if (userId && bookingUserId && userId === bookingUserId) return true;

    const sameName =
        normalize(data.customerAccountName) === normalize(currentUser.fullName) ||
        normalize(data.sender) === normalize(currentUser.fullName);

    const sameContact =
        String(data.contact || "").trim() === String(currentUser.contactNumber || "").trim();

    return sameName && sameContact;
}

function loadCurrentUser() {
    currentUser = safeParseStorage(CURRENT_USER_KEY);

    if (!currentUser || currentUser.role !== "user") {
        alert("Please log in as a customer first.");
        window.location.href = "login.html";
        return false;
    }

    return true;
}

function loadBookings() {
    userBookings = [];

    for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (!key || !key.startsWith("CC")) continue;

        const data = safeParseStorage(key);
        if (!data || !data.id) continue;

        if (belongsToCurrentUser(data)) {
            userBookings.push({ key: key, data: data });
        }
    }

    userBookings.sort(function(a, b) {
        const aTime = new Date(a.data.createdAt || a.data.timestamp || 0).getTime();
        const bTime = new Date(b.data.createdAt || b.data.timestamp || 0).getTime();
        return bTime - aTime;
    });
}

function renderProfile() {
    document.getElementById("avatarInitials").innerText = getInitials(currentUser.fullName);
    document.getElementById("displayName").innerText = currentUser.fullName || "Customer";
    document.getElementById("displayEmail").innerText = currentUser.email || "---";

    document.getElementById("infoName").innerText = currentUser.fullName || "---";
    document.getElementById("infoEmail").innerText = currentUser.email || "---";
    document.getElementById("infoContact").innerText = currentUser.contactNumber || "---";
    document.getElementById("infoAddress").innerText = currentUser.completeAddress || "---";

    document.getElementById("editName").value = currentUser.fullName || "";
    document.getElementById("editEmail").value = currentUser.email || "";
    document.getElementById("editContact").value = currentUser.contactNumber || "";
    document.getElementById("editAddress").value = currentUser.completeAddress || "";
}

function renderStats() {
    const total = userBookings.length;
    const delivered = userBookings.filter(function(item) {
        return item.data.status === "Delivered";
    }).length;

    const active = total - delivered;

    const totalPaid = userBookings.reduce(function(sum, item) {
        return sum + Number(item.data.paymentAmount || item.data.estimatedCost || 0);
    }, 0);

    document.getElementById("totalBookings").innerText = total;
    document.getElementById("activeBookings").innerText = active;
    document.getElementById("deliveredBookings").innerText = delivered;
    document.getElementById("totalPaid").innerText = money(totalPaid);
}

function getStatusBadge(status) {
    const s = status || "Unknown";

    if (s === "Delivered") {
        return `<span class="badge-status badge-delivered">${esc(s)}</span>`;
    }

    if (s === "Pending Confirmation") {
        return `<span class="badge-status badge-pending">${esc(s)}</span>`;
    }

    return `<span class="badge-status">${esc(s)}</span>`;
}

function renderHistory() {
    const tbody = document.getElementById("historyTableBody");
    const search = normalize(document.getElementById("historySearch").value);
    const filter = document.getElementById("statusFilter").value;

    tbody.innerHTML = "";

    let filtered = userBookings.filter(function(item) {
        const data = item.data;

        const haystack = normalize([
            data.id,
            data.origin,
            data.destination,
            data.receiver,
            data.status,
            data.service
        ].join(" "));

        const matchesSearch = !search || haystack.includes(search);

        let matchesFilter = true;

        if (filter === "active") {
            matchesFilter = data.status !== "Delivered";
        } else if (filter !== "all") {
            matchesFilter = data.status === filter;
        }

        return matchesSearch && matchesFilter;
    });

    if (filtered.length === 0) {
        tbody.innerHTML = `
            <tr>
                <td colspan="6">
                    <div class="empty-state">
                        No bookings found for this profile.
                    </div>
                </td>
            </tr>
        `;
        return;
    }

    filtered.forEach(function(item) {
        const data = item.data;
        const paymentAmount = data.paymentAmount || data.estimatedCost || 0;

        tbody.innerHTML += `
            <tr>
                <td><span class="tracking-id">${esc(data.id || item.key)}</span></td>
                <td>${esc(data.origin || "---")} → ${esc(data.destination || "---")}</td>
                <td>${esc(data.receiver || "---")}</td>
                <td>${getStatusBadge(data.status)}</td>
                <td>
                    <strong>${money(paymentAmount)}</strong><br>
                    <small class="text-muted">${esc(data.paymentStatus || "Unpaid")}</small>
                </td>
                <td>
                    <button class="btn btn-dark btn-sm fw-bold" onclick="openDetails('${esc(item.key)}')">
                        Details
                    </button>
                    <button class="btn btn-warning btn-sm fw-bold" onclick="openWaybill('${esc(data.id || item.key)}')">
                        Waybill
                    </button>
                    ${
                        data.status === "Pending Confirmation"
                            ? `<button class="btn btn-outline-danger btn-sm fw-bold mt-1" onclick="cancelBooking('${esc(item.key)}')">Cancel</button>`
                            : ""
                    }
                </td>
            </tr>
        `;
    });
}

function openDetails(key) {
    localStorage.setItem("activeID", key);
    window.location.href = "details.html";
}

function openWaybill(id) {
    window.open("waybill.html?id=" + encodeURIComponent(id), "_blank");
}

function cancelBooking(key) {
    const data = safeParseStorage(key);

    if (!data) {
        showValidation("Booking record was not found.", "error");
        return;
    }

    if (data.status !== "Pending Confirmation") {
        showValidation("Only bookings that are still pending confirmation can be cancelled.", "error");
        return;
    }

    if (!confirm("Cancel booking " + data.id + "?")) {
        return;
    }

    localStorage.removeItem(key);

    loadBookings();
    renderStats();
    renderHistory();

    showValidation("Booking " + data.id + " has been cancelled.", "success");
}

function saveProfile() {
    const fullName = document.getElementById("editName").value.trim();
    const email = document.getElementById("editEmail").value.trim();
    const contactNumber = document.getElementById("editContact").value.trim();
    const completeAddress = document.getElementById("editAddress").value.trim();

    if (!fullName || !email || !contactNumber || !completeAddress) {
        showValidation("Please fill in all profile fields.", "error");
        return;
    }

    if (!/^09\d{9}$/.test(contactNumber)) {
        showValidation("Please enter a valid PH mobile number, like 09123456789.", "error");
        return;
    }

    let users = [];

    try {
        users = JSON.parse(localStorage.getItem(USERS_KEY)) || [];
    } catch {
        users = [];
    }

    const duplicate = users.some(function(user) {
        const sameEmail = normalize(user.email) === normalize(email);
        const differentUser = String(user.id || "") !== String(currentUser.id || "");
        return sameEmail && differentUser;
    });

    if (duplicate) {
        showValidation("Another account already uses that email address.", "error");
        return;
    }

    users = users.map(function(user) {
        if (String(user.id || "") === String(currentUser.id || "")) {
            return {
                ...user,
                fullName: fullName,
                email: email,
                contactNumber: contactNumber,
                completeAddress: completeAddress
            };
        }

        return user;
    });

    currentUser = {
        ...currentUser,
        fullName: fullName,
        email: email,
        contactNumber: contactNumber,
        completeAddress: completeAddress
    };

    localStorage.setItem(USERS_KEY, JSON.stringify(users));
    localStorage.setItem(CURRENT_USER_KEY, JSON.stringify(currentUser));

    renderProfile();
    loadBookings();
    renderStats();
    renderHistory();

    showValidation("Profile updated successfully.", "success");
}

window.onload = function() {
    if (!loadCurrentUser()) return;

    renderProfile();
    loadBookings();
    renderStats();
    renderHistory();
};
</script>

</body>
</html>
