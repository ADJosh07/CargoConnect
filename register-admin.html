<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Admin - CargoConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-gold: #ffc107;
            --dark-bg: #000000;
        }
        
        body {
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            min-height: 100vh;
            padding: 20px;
            font-family: 'Poppins', sans-serif;
        }
        
        .register-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            max-width: 500px;
            margin: 30px auto;
            padding: 40px;
        }
        
        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .register-header h1 {
            color: var(--dark-bg);
            font-weight: 700;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .register-header .badge {
            background: var(--primary-gold);
            color: var(--dark-bg);
            font-size: 0.9rem;
            padding: 6px 12px;
        }
        
        .register-header p {
            color: #999;
            font-size: 0.9rem;
            margin-top: 10px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            font-weight: 600;
            color: var(--dark-bg);
            margin-bottom: 8px;
        }
        
        .form-group input {
            border: 2px solid #eee;
            border-radius: 8px;
            padding: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus {
            border-color: var(--primary-gold);
            box-shadow: 0 0 10px rgba(255, 193, 7, 0.2);
        }
        
        .btn-register {
            width: 100%;
            padding: 12px;
            background: var(--primary-gold);
            color: var(--dark-bg);
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        .btn-register:hover {
            background: white;
            color: var(--dark-bg);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 193, 7, 0.4);
        }
        
        .register-footer {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        
        .register-footer a {
            color: var(--primary-gold);
            text-decoration: none;
            font-weight: 600;
        }
        
        .register-footer a:hover {
            text-decoration: underline;
        }
        
        .alert {
            border-radius: 8px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <h1>CARGO<span style="color: var(--primary-gold);">CONNECT</span></h1>
            <span class="badge"><i class="fas fa-shield-alt"></i> ADMIN REGISTRATION</span>
            <p>Create an admin account</p>
        </div>
        
        <div id="alertMessage"></div>
        
        <form id="adminRegisterForm">
            <div class="form-group">
                <label for="adminName">Full Name</label>
                <input type="text" class="form-control" id="adminName" placeholder="Enter your full name" required>
            </div>
            
            <div class="form-group">
                <label for="adminEmail">Email Address</label>
                <input type="email" class="form-control" id="adminEmail" placeholder="Enter your email" required>
            </div>
            
            <div class="form-group">
                <label for="adminPhone">Phone Number</label>
                <input type="tel" class="form-control" id="adminPhone" placeholder="Optional" />
            </div>
            
            <div class="form-group">
                <label for="adminAddress">Address</label>
                <input type="text" class="form-control" id="adminAddress" placeholder="Optional" />
            </div>
            
            <div class="form-group">
                <label for="adminPassword">Password</label>
                <input type="password" class="form-control" id="adminPassword" placeholder="At least 6 characters" required>
            </div>
            
            <div class="form-group">
                <label for="adminConfirmPassword">Confirm Password</label>
                <input type="password" class="form-control" id="adminConfirmPassword" placeholder="Re-enter your password" required>
            </div>
            
            <button type="submit" class="btn-register">
                <i class="fas fa-user-check"></i> Create Admin Account
            </button>
        </form>
        
        <div class="register-footer">
            <p><a href="login.html">Back to Login</a></p>
        </div>
    </div>
    
    <script>
        // Override alert to show Bootstrap alert
        window.alert = function(message) {
            const alertDiv = document.getElementById('alertMessage');
            const alertClass = message.includes('failed') || message.includes('error') ? 'alert-danger' : 'alert-success';
            alertDiv.innerHTML = `<div class="alert ${alertClass} alert-dismissible fade show" role="alert">
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>`;
            if (!message.includes('failed') && !message.includes('error')) {
                setTimeout(() => alertDiv.innerHTML = '', 5000);
            }
        };

        // Register admin handler
        async function registerAdmin(event) {
            event.preventDefault();

            const fullName = document.getElementById("adminName").value.trim();
            const email = document.getElementById("adminEmail").value.trim();
            const phone = document.getElementById("adminPhone").value.trim();
            const address = document.getElementById("adminAddress").value.trim();
            const password = document.getElementById("adminPassword").value;
            const confirmPassword = document.getElementById("adminConfirmPassword").value;

            if (!fullName || !email || !password || !confirmPassword) {
                alert("Please fill in all required fields.");
                return;
            }

            if (password.length < 6) {
                alert("Password must be at least 6 characters.");
                return;
            }

            if (password !== confirmPassword) {
                alert("Passwords do not match.");
                return;
            }

            try {
                const response = await fetch('../backend/register-admin.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        full_name: fullName,
                        email: email,
                        phone: phone || null,
                        address: address || null,
                        password: password
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const result = await response.json();

                if (!result.success) {
                    throw new Error(result.message || 'Registration failed');
                }

                alert("Admin account created successfully! You can now log in.");
                window.location.href = "login.html";

            } catch (error) {
                alert("Admin registration failed: " + error.message);
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            const adminForm = document.getElementById("adminRegisterForm");
            if (adminForm) {
                adminForm.addEventListener("submit", registerAdmin);
            }
        });
    </script>
</body>
</html>
