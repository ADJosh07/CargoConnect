<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CargoConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-gold: #ffc107;
            --dark-bg: #000000;
        }
        
        body {
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            min-height: 100vh;
            padding: 20px;
            font-family: 'Poppins', sans-serif;
        }
        
        .register-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            max-width: 500px;
            margin: 30px auto;
            padding: 40px;
        }
        
        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .register-header h1 {
            color: var(--dark-bg);
            font-weight: 700;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .register-header p {
            color: #999;
            font-size: 0.9rem;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            font-weight: 600;
            color: var(--dark-bg);
            margin-bottom: 8px;
        }
        
        .form-group input {
            border: 2px solid #eee;
            border-radius: 8px;
            padding: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus {
            border-color: var(--primary-gold);
            box-shadow: 0 0 10px rgba(255, 193, 7, 0.2);
        }
        
        .btn-register {
            width: 100%;
            padding: 12px;
            background: var(--primary-gold);
            color: var(--dark-bg);
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        .btn-register:hover {
            background: white;
            color: var(--dark-bg);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 193, 7, 0.4);
        }
        
        .register-footer {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        
        .register-footer a {
            color: var(--primary-gold);
            text-decoration: none;
            font-weight: 600;
        }
        
        .register-footer a:hover {
            text-decoration: underline;
        }
        
        .alert {
            border-radius: 8px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <h1>CARGO<span style="color: var(--primary-gold);">CONNECT</span></h1>
            <p>Create your account</p>
        </div>
        
        <div id="alertMessage"></div>
        
        <form id="registerForm">
            <div class="form-group">
                <label for="regName">Full Name</label>
                <input type="text" class="form-control" id="regName" placeholder="Enter your full name" required>
            </div>
            
            <div class="form-group">
                <label for="regEmail">Email Address</label>
                <input type="email" class="form-control" id="regEmail" placeholder="Enter your email" required>
            </div>
            
            <div class="form-group">
                <label for="regContact">Phone Number</label>
                <input type="tel" class="form-control" id="regContact" placeholder="09123456789 (PH format)" required>
            </div>
            
            <div class="form-group">
                <label for="regAddress">Home Address</label>
                <input type="text" class="form-control" id="regAddress" placeholder="Enter your home address" required>
            </div>
            
            <div class="form-group">
                <label for="regPassword">Password</label>
                <input type="password" class="form-control" id="regPassword" placeholder="At least 6 characters" required>
            </div>
            
            <div class="form-group">
                <label for="regConfirmPassword">Confirm Password</label>
                <input type="password" class="form-control" id="regConfirmPassword" placeholder="Re-enter your password" required>
            </div>
            
            <button type="submit" class="btn-register">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
        </form>
        
        <div class="register-footer">
            <p>Already have an account? <a href="login.html">Login here</a></p>
            <p><a href="index.html">Back to Home</a></p>
        </div>
    </div>
    
    <script src="auth.js"></script>
    <script>
        // Override the alert to show Bootstrap alert instead
        window.alert = function(message) {
            const alertDiv = document.getElementById('alertMessage');
            const alertClass = message.includes('failed') || message.includes('error') ? 'alert-danger' : 'alert-success';
            alertDiv.innerHTML = `<div class="alert ${alertClass} alert-dismissible fade show" role="alert">
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>`;
            // Auto-dismiss after 5 seconds if success
            if (!message.includes('failed') && !message.includes('error')) {
                setTimeout(() => alertDiv.innerHTML = '', 5000);
            }
        };
    </script>
</body>
</html>
