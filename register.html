<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | CargoConnect</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --primary-gold: #ffc107;
            --dark-bg: #000000;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0e0e0e;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .login-container {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            width: 1050px;
            min-height: 650px;
            display: flex;
            background: #fff;
            border-radius: 15px;
            overflow: hidden;
            border: 4px solid var(--dark-bg);
            box-shadow: 20px 20px 0px rgba(255, 193, 7, 0.15);
        }

        .brand-side {
            flex: 0 0 400px;
            background: var(--dark-bg);
            color: white;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            border-right: 8px solid var(--primary-gold);
        }

        .brand-side h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--primary-gold);
            margin-bottom: 20px;
            line-height: 1.1;
        }

        .brand-side p {
            font-size: 0.9rem;
            opacity: 0.8;
            font-weight: 300;
        }

        .stat-tag {
            position: absolute;
            bottom: 40px;
            left: 60px;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--primary-gold);
            text-transform: uppercase;
            border: 1px solid rgba(255,193,7,0.3);
            padding: 5px 15px;
            border-radius: 50px;
        }

        .form-side {
            flex: 1;
            padding: 50px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-header h2 {
            font-weight: 800;
            text-transform: uppercase;
            color: var(--dark-bg);
            margin-bottom: 5px;
        }

        .form-header p {
            font-size: 0.8rem;
            color: #777;
            margin-bottom: 35px;
        }

        .form-label {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--dark-bg);
            margin-bottom: 6px;
        }

        .form-control {
            border: 2px solid #eee;
            padding: 10px 15px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 8px;
            transition: 0.3s;
        }

        .form-control:focus {
            border-color: var(--primary-gold);
            box-shadow: none;
            background: #fffdf5;
        }

        .btn-register {
            background: var(--dark-bg);
            color: var(--primary-gold);
            border: none;
            padding: 14px;
            font-weight: 800;
            letter-spacing: 1px;
            border-radius: 8px;
            margin-top: 15px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-register:hover {
            background: var(--primary-gold);
            color: var(--dark-bg);
            transform: translateY(-2px);
        }

        .back-link {
            text-align: center;
            margin-top: 25px;
            font-size: 13px;
        }

        .back-link a {
            color: var(--dark-bg);
            font-weight: 800;
            text-decoration: none;
            border-bottom: 2px solid var(--primary-gold);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="brand-side d-none d-md-flex">
                <h1>JOIN THE<br>CARGO<br>NETWORK</h1>
                <p>Register as a certified operator to begin managing global logistics and real-time fleet operations.</p>
                <div class="stat-tag">Verified Node // 5,000+ Active Units</div>
            </div>

            <div class="form-side">
                <div class="form-header">
                    <h2>Register</h2>
                    <p>Enter your details to create a new profile.</p>
                </div>

                <form id="registerForm" class="row g-3">
                    <div class="col-12">
                        <label class="form-label" for="regName">FULL NAME</label>
                        <input type="text" id="regName" class="form-control" placeholder="Juan Dela Cruz" required>
                    </div>

                    <div class="col-12">
                        <label class="form-label" for="regEmail">EMAIL ADDRESS</label>
                        <input type="email" id="regEmail" class="form-control" placeholder="juan@cargoconnect.com" required>
                    </div>

                    <div class="col-12">
                        <label class="form-label" for="regContact">CONTACT NUMBER</label>
                        <input type="tel" id="regContact" class="form-control" placeholder="0912 345 6789" required>
                    </div>

                    <div class="col-12">
                        <label class="form-label" for="regAddress">COMPLETE ADDRESS</label>
                        <input type="text" id="regAddress" class="form-control" placeholder="Street, City, Province" required>
                    </div>

                    <div class="col-md-6">
    <label class="form-label" for="regPassword">SET PASSWORD</label>
    <div style="position: relative;">
        <input type="password" id="regPassword" class="form-control" placeholder="Enter password" required style="padding-right:45px;">
        <button type="button"
            onclick="toggleRegisterPassword('regPassword', 'regPasswordIcon')"
            style="position:absolute; right:10px; top:50%; transform:translateY(-50%); border:none; background:transparent; color:#000; cursor:pointer;">
            <i id="regPasswordIcon" class="fa-solid fa-eye"></i>
        </button>
    </div>
</div>

<div class="col-md-6">
    <label class="form-label" for="regConfirmPassword">CONFIRM PASSWORD</label>
    <div style="position: relative;">
        <input type="password" id="regConfirmPassword" class="form-control" placeholder="Confirm password" required style="padding-right:45px;">
        <button type="button"
            onclick="toggleRegisterPassword('regConfirmPassword', 'regConfirmPasswordIcon')"
            style="position:absolute; right:10px; top:50%; transform:translateY(-50%); border:none; background:transparent; color:#000; cursor:pointer;">
            <i id="regConfirmPasswordIcon" class="fa-solid fa-eye"></i>
        </button>
    </div>
</div>


                    <div class="col-12">
                        <button type="submit" class="btn btn-register w-100">REGISTER</button>
                    </div>
                </form>

                <div class="back-link">
                    <span class="text-muted">Existing Member?</span>
                    <a href="login.html">RETURN TO LOGIN</a>
                </div>
            </div>
        </div>
    </div>

    <script>
function toggleRegisterPassword(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon = document.getElementById(iconId);

    if (input.type === "password") {
        input.type = "text";
        icon.className = "fa-solid fa-eye-slash";
    } else {
        input.type = "password";
        icon.className = "fa-solid fa-eye";
    }
}
</script>

    <script src="auth.js"></script>
</body>
</html>
